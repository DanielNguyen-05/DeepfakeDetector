dataset:
  cifake_path: ./datasets/cifake
  labels: 2
  name: cifake

model:
  add_magnitude_channel: true
  add_fft_channel: true
  add_lbp_channel: true
  add_gabor_channel: true
  backbone: MobileNetV3-Small
  freeze_backbone: false

train:
  accumulation_batches: 4
  batch_size: 32
  epoch_num: 10
  limit_train_batches: 1.0
  limit_val_batches: 1.0
  mixed_precision: true
  resolution: 224
  seed: 5

test:
  batch_size: 32
  limit_test_batches: 1.0
  mixed_precision: true
  resolution: 224
  seed: 5
  weights_path: ./final_trained/cifake_20260501_0926_full/checkpoints/cifake_MobileNetV3-Small_epoch=5-train_acc=0.99-val_acc=0.97.ckpt