<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MobileNet4DFR — Deepfake Scanner</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0d0e12;
      --surface:  #14161d;
      --border:   #23263a;
      --accent:   #4f7cff;
      --accent2:  #a259ff;
      --real:     #22c55e;
      --fake:     #ef4444;
      --text:     #e8eaf0;
      --muted:    #6b7280;
      --mono:     'Space Mono', monospace;
      --sans:     'DM Sans', sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      overflow-x: hidden;
    }

    /* ── ambient glow behind card ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 40% at 30% 20%, rgba(79,124,255,.09) 0%, transparent 70%),
        radial-gradient(ellipse 50% 35% at 75% 80%, rgba(162,89,255,.07) 0%, transparent 70%);
      pointer-events: none;
    }

    .card {
      width: 100%;
      max-width: 520px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 40px 36px;
      position: relative;
    }

    /* thin top-border gradient */
    .card::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 16px;
      padding: 1px;
      background: linear-gradient(135deg, rgba(79,124,255,.4), rgba(162,89,255,.2), transparent 60%);
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      pointer-events: none;
    }

    /* ── header ── */
    .header { margin-bottom: 32px; }
    .badge {
      display: inline-block;
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--accent);
      border: 1px solid rgba(79,124,255,.3);
      border-radius: 4px;
      padding: 3px 8px;
      margin-bottom: 14px;
    }
    h1 {
      font-family: var(--mono);
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -.01em;
      line-height: 1.25;
      color: var(--text);
    }
    h1 span { color: var(--accent); }
    .sub {
      margin-top: 8px;
      font-size: 13px;
      color: var(--muted);
      line-height: 1.6;
    }
    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 12px;
    }
    .chip {
      font-family: var(--mono);
      font-size: 10px;
      padding: 3px 8px;
      border-radius: 4px;
      background: rgba(255,255,255,.04);
      border: 1px solid var(--border);
      color: var(--muted);
    }

    /* ── drop zone ── */
    .drop-zone {
      border: 1.5px dashed var(--border);
      border-radius: 10px;
      padding: 28px 16px;
      text-align: center;
      cursor: pointer;
      transition: border-color .2s, background .2s;
      position: relative;
      overflow: hidden;
    }
    .drop-zone:hover, .drop-zone.drag-over {
      border-color: var(--accent);
      background: rgba(79,124,255,.04);
    }
    .drop-zone input { display: none; }
    .drop-icon {
      width: 40px;
      height: 40px;
      margin: 0 auto 12px;
      border-radius: 10px;
      background: rgba(79,124,255,.12);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .drop-icon svg { width: 20px; height: 20px; stroke: var(--accent); fill: none; stroke-width: 1.8; }
    .drop-label { font-size: 13px; color: var(--muted); }
    .drop-label strong { color: var(--text); font-weight: 500; }

    /* ── preview ── */
    #preview-wrap {
      display: none;
      margin-top: 16px;
      border-radius: 10px;
      overflow: hidden;
      border: 1px solid var(--border);
      position: relative;
    }
    #preview {
      display: block;
      width: 100%;
      max-height: 280px;
      object-fit: cover;
    }
    .preview-name {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 8px 12px;
      background: rgba(13,14,18,.7);
      font-family: var(--mono);
      font-size: 11px;
      color: var(--muted);
      backdrop-filter: blur(6px);
    }

    /* ── button ── */
    #scan-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      margin-top: 18px;
      padding: 13px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      font-family: var(--mono);
      font-size: 13px;
      font-weight: 700;
      letter-spacing: .04em;
      text-transform: uppercase;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff;
      transition: opacity .2s, transform .15s;
    }
    #scan-btn:hover:not(:disabled) { opacity: .88; transform: translateY(-1px); }
    #scan-btn:disabled { opacity: .4; cursor: not-allowed; transform: none; }

    /* spinner */
    .spinner {
      display: none;
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255,255,255,.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── result ── */
    #result {
      display: none;
      margin-top: 20px;
      border-radius: 10px;
      padding: 18px 20px;
      border: 1px solid;
      animation: fadeUp .3s ease;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    #result.real { background: rgba(34,197,94,.08); border-color: rgba(34,197,94,.3); }
    #result.fake { background: rgba(239,68,68,.08);  border-color: rgba(239,68,68,.3); }

    .result-row { display: flex; align-items: center; gap: 12px; }
    .result-icon {
      width: 38px; height: 38px;
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .real .result-icon { background: rgba(34,197,94,.15); }
    .fake .result-icon { background: rgba(239,68,68,.15); }
    .result-icon svg { width: 20px; height: 20px; fill: none; stroke-width: 2; }
    .real .result-icon svg { stroke: var(--real); }
    .fake .result-icon svg { stroke: var(--fake); }

    .result-verdict {
      font-family: var(--mono);
      font-size: 18px;
      font-weight: 700;
    }
    .real .result-verdict { color: var(--real); }
    .fake .result-verdict { color: var(--fake); }
    .result-conf {
      font-size: 12px;
      color: var(--muted);
      margin-top: 2px;
    }

    /* confidence bar */
    .conf-bar-wrap {
      margin-top: 14px;
      height: 4px;
      background: rgba(255,255,255,.06);
      border-radius: 99px;
      overflow: hidden;
    }
    .conf-bar {
      height: 100%;
      border-radius: 99px;
      transition: width .6s ease;
    }
    .real .conf-bar  { background: var(--real); }
    .fake .conf-bar  { background: var(--fake); }

    /* ── footer ── */
    .footer {
      margin-top: 24px;
      font-size: 11px;
      color: var(--muted);
      text-align: center;
    }
  </style>
</head>
<body>

<div class="card">
  <div class="header">
    <div class="badge">MobileNet4DFR v1.0</div>
    <h1>Deepfake <span>Scanner</span></h1>
    <p class="sub">Multi-modal fusion model — detects AI-generated images using spectral and texture analysis.</p>
    <div class="chips">
      <span class="chip">RGB</span>
      <span class="chip">FFT</span>
      <span class="chip">LBP</span>
      <span class="chip">Gabor</span>
      <span class="chip">MobileNetV3-Small</span>
    </div>
  </div>

  <!-- Drop zone -->
  <div class="drop-zone" id="drop-zone"
       onclick="document.getElementById('fileInput').click()"
       ondragover="handleDragOver(event)"
       ondragleave="handleDragLeave(event)"
       ondrop="handleDrop(event)">
    <input type="file" id="fileInput" accept="image/*" onchange="handleFile(event.target.files[0])">
    <div class="drop-icon">
      <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
    </div>
    <p class="drop-label"><strong>Click to upload</strong> or drag &amp; drop</p>
    <p class="drop-label" style="margin-top:4px;font-size:11px;">PNG, JPG, WEBP</p>
  </div>

  <!-- Preview -->
  <div id="preview-wrap">
    <img id="preview" alt="Selected image">
    <div class="preview-name" id="preview-name"></div>
  </div>

  <!-- Scan button -->
  <button id="scan-btn" onclick="uploadAndPredict()" disabled>
    <div class="spinner" id="spinner"></div>
    <span id="btn-text">Scan image</span>
  </button>

  <!-- Result -->
  <div id="result">
    <div class="result-row">
      <div class="result-icon">
        <svg id="result-icon-svg" viewBox="0 0 24 24"></svg>
      </div>
      <div>
        <div class="result-verdict" id="result-verdict"></div>
        <div class="result-conf" id="result-conf"></div>
      </div>
    </div>
    <div class="conf-bar-wrap">
      <div class="conf-bar" id="conf-bar" style="width:0%"></div>
    </div>
  </div>

  <div class="footer">Results are probabilistic estimates and may not be 100% accurate.</div>
</div>

<script>
  let selectedFile = null;

  function handleFile(file) {
    if (!file) return;
    selectedFile = file;
    const reader = new FileReader();
    reader.onload = e => {
      document.getElementById('preview').src = e.target.result;
      document.getElementById('preview-wrap').style.display = 'block';
      document.getElementById('preview-name').textContent = file.name;
      document.getElementById('scan-btn').disabled = false;
      document.getElementById('result').style.display = 'none';
    };
    reader.readAsDataURL(file);
  }

  function handleDragOver(e) {
    e.preventDefault();
    document.getElementById('drop-zone').classList.add('drag-over');
  }
  function handleDragLeave(e) {
    document.getElementById('drop-zone').classList.remove('drag-over');
  }
  function handleDrop(e) {
    e.preventDefault();
    document.getElementById('drop-zone').classList.remove('drag-over');
    const file = e.dataTransfer.files[0];
    if (file && file.type.startsWith('image/')) handleFile(file);
  }

  async function uploadAndPredict() {
    if (!selectedFile) return;

    const btn     = document.getElementById('scan-btn');
    const spinner = document.getElementById('spinner');
    const btnText = document.getElementById('btn-text');
    const result  = document.getElementById('result');

    btn.disabled = true;
    spinner.style.display = 'block';
    btnText.textContent = 'Scanning…';
    result.style.display = 'none';

    const formData = new FormData();
    formData.append('file', selectedFile);

    try {
      const response = await fetch('/predict', { method: 'POST', body: formData });
      const data = await response.json();

      if (data.status === 'success') {
        const isFake = data.prediction === 'FAKE';
        const confNum = parseFloat(data.confidence);

        result.className = isFake ? 'fake' : 'real';
        result.style.display = 'block';

        document.getElementById('result-verdict').textContent =
          isFake ? '⚠ AI-Generated (Fake)' : '✓ Authentic (Real)';
        document.getElementById('result-conf').textContent =
          `Confidence: ${data.confidence}`;

        // icon
        const iconSvg = document.getElementById('result-icon-svg');
        iconSvg.innerHTML = isFake
          ? '<circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/>'
          : '<path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/>';

        // confidence bar (animate on next frame)
        const bar = document.getElementById('conf-bar');
        bar.style.width = '0%';
        requestAnimationFrame(() => {
          requestAnimationFrame(() => { bar.style.width = confNum + '%'; });
        });
      } else {
        alert('Error: ' + data.message);
      }
    } catch (err) {
      alert('Network error — is the backend running?');
    } finally {
      btn.disabled = false;
      spinner.style.display = 'none';
      btnText.textContent = 'Scan image';
    }
  }
</script>
</body>
</html>
