dataset:
  cifake_path: ./datasets/cifake
  labels: 2
  name: cifake

model:
  add_magnitude_channel: false
  add_fft_channel: true
  add_lbp_channel: true
  add_gabor_channel: false
  backbone: MobileNetV3-Small
  freeze_backbone: true

train:
  accumulation_batches: 4
  batch_size: 32
  epoch_num: 10
  limit_train_batches: 1.0
  limit_val_batches: 1.0
  mixed_precision: true
  resolution: 224
  seed: 5

test:
  batch_size: 32
  limit_test_batches: 1.0
  mixed_precision: true
  resolution: 224
  seed: 5
  weights_path: ./self_trained/cifake_20260414_1744_results_cifake_mobilenetv3_small_frozen/checkpoints/cifake_MobileNetV3-Small_epoch=8-train_acc=0.84-val_acc=0.85.ckpt