dataset:
  coco2014_path: ./datasets/coco2014
  coco_fake_path: ./datasets/fake_coco
  labels: 2
  name: coco_fake

model:
  add_magnitude_channel: false
  add_fft_channel: true
  add_lbp_channel: true
  add_gabor_channel: false
  backbone: MobileNetV3-Small
  freeze_backbone: false

train:
  accumulation_batches: 4
  batch_size: 32
  epoch_num: 5
  limit_train_batches: 1.0
  limit_val_batches: 1.0
  mixed_precision: true
  resolution: 224
  seed: 5

test:
  batch_size: 32
  limit_test_batches: 1.0
  mixed_precision: true
  resolution: 224
  seed: 5
  weights_path: ./final_trained/coco_fake_20260419_1717_coco_mobilenetv3_small_unfrozen_SE_lbp_fft/checkpoints/coco_fake_MobileNetV3-Small_epoch=4-train_acc=1.00-val_acc=0.98.ckpt