dataset:
  cifake_path: ./datasets/cifake
  labels: 2
  name: cifake
model:
  add_fft_channel: true
  add_lbp_channel: true
  add_gabor_channel: false
  add_magnitude_channel: false
  backbone: BNext-M
  freeze_backbone: false
test:
  batch_size: 32
  limit_test_batches: 1.0
  mixed_precision: true
  resolution: 224
  seed: 5
  weights_path: ./final_trained/cifake_20260418_1659_cifake_baseline_M_unfrozen/checkpoints/cifake_BNext-M_epoch=5-train_acc=0.99-val_acc=0.97.ckpt
train:
  accumulation_batches: 4
  batch_size: 32
  epoch_num: 10
  limit_train_batches: 1.0
  limit_val_batches: 1.0
  mixed_precision: true
  resolution: 224
  seed: 5
