dataset:
  cifake_path: ./datasets/cifake
  labels: 2
  name: cifake
model:
  add_fft_channel: true
  add_lbp_channel: true
  add_gabor_channel: false
  add_magnitude_channel: false
  backbone: BNext-S
  freeze_backbone: true
test:
  batch_size: 32
  limit_test_batches: 1.0
  mixed_precision: true
  resolution: 224
  seed: 5
  weights_path: ./final_trained/cifake_20260418_0801_cifake_baseline_S/checkpoints/cifake_BNext-S_epoch=8-train_acc=0.83-val_acc=0.84.ckpt
train:
  accumulation_batches: 4
  batch_size: 32
  epoch_num: 10
  limit_train_batches: 1.0
  limit_val_batches: 1.0
  mixed_precision: true
  resolution: 224
  seed: 5
